<!DOCTYPE html>
<html lang="be">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        if (/Android|iPhone|iPad/i.test(navigator.userAgent)) {
            window.location.href = "MBelSDUM/Mindex.html" + window.location.search;
        }
    </script>

    <title id="page-title">BelSDUM | Загрузка...</title>
    <link rel="stylesheet" href="release.css"> 
    <link rel="icon" type="image/png" href="LogoBelSDUMPNG.png">
</head>
<body>
    
    <img src="icon/Logo.png" alt="Logo" class="main-logo" draggable="false">

    <div class="content-container">
        
        <div class="top-section">
            
            <div class="poster-container">
                <img id="rel-poster" src="" alt="Постер" draggable="false">
                
                <div style="display: flex; gap: 1rem; width: 100%;">
                    <a href="#" id="watch-btn" class="play-btn" style="flex: 1;">Глядзець</a>
                    <button type="button" id="fav-btn" class="fav-action-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="info-card">
                <div class="card-header">
                    <div class="title-group">
                        <h1 id="rel-title">Загрузка...</h1>
                        <h2 id="rel-subtitle" class="sub-title">...</h2>
                    </div>
                    <div class="rating-group">
                        <div id="rel-score" class="rating-value">0,0</div>
                        <div id="rel-duration" class="duration">...</div>
                    </div>
                </div>

                <div id="rel-desc" class="description"></div>
            </div>
        </div>

        <div class="trailer-wrapper" id="trailerWrapper">
            <canvas id="ambientCanvas" class="ambient-light"></canvas>
            <div class="trailer-container" id="trailerBox">
                <video id="previewVideo" autoplay muted loop playsinline></video>
                <div class="play-overlay">Націсніце, каб уключыць гук</div>
            </div>
        </div>


    </div>
    
    <div id="shareBtn">
        <img id="shareBtnImg" src="icon/SHARE.png" class="shareImg">
    </div>
    
    <a id="backBtn" href="index.html">Назад</a>

    <div id="shareModal" class="modal-overlay">
        <div class="modal-content">

            <h3 class="modal-header">Падзяліцца</h3>
            
            <div class="share-socials-row">
                <a href="#" id="shareTG" class="social-btn tg-btn" target="_blank">
                    <span>Telegram</span>
                </a>
            </div>

            <div class="modal-input-wrapper">
                <input type="text" id="shareInputLink" readonly>
                <button type="button" id="copyLinkBtn" class="modal-copy-btn">
                    <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span id="copyBtnText">Капіяваць</span>
                </button>
            </div>
        </div>
    </div>

        
    <script src="database.js"></script>
    <script src="release.js"></script>

</body>
</html>
