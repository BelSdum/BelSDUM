<!DOCTYPE html>
<html lang="be">
<head>
  <meta charset="UTF-8">
  <title>BelSDUM | Байцоўскі клуб</title>
  <link rel="stylesheet" href="BelSDUM.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<img id="Logo" src="../Картинки\Logo.png" alt="Overlay" draggable="false">
<div class="space-stars-back"></div>
<div class="space-stars-front"></div>

<div class="player" id="mainPlayer" tabindex="0">
  <div class="video-header" id="videoHeader">
    <h1 class="main-title">Байцоўскі клуб</h1>
    <h2 class="sub-title">Fight Club</h2>
  </div>

  <img id="playerCornerLogo" src="../Картинки\Logo.png" alt="Logo" draggable="false">
  
  <video id="video" src="https://pub-e265e68b5cd54b969a844c74b92b4fd3.r2.dev/Fight.Club.1999.REPACK.1080p.BluRay.x264.AAC5.1-YTS.MX.mkv.mkv"></video>
  <audio id="externalAudio" src="https://pub-e265e68b5cd54b969a844c74b92b4fd3.r2.dev/Fight.Club.1999.REPACK.1080p.BluRay.x264.AAC5.1-[YTS.MX].mkv.m4a"></audio>
  <img id="overlayImage" src="../Картинки\warning.png" alt="Overlay">
  <div id="skipBtn">Прапусціць</div>

  <div class="quality-menu hide" id="qualityMenu">
    <div class="quality-header">Якасць</div>
    <div class="quality-item active" data-quality="1080p">1080p <span class="badge">FHD</span></div>
    <div class="quality-item" data-quality="720p">720p <span class="badge">HD</span></div>
    <div class="quality-item" data-quality="480p">480p</div>
  </div>

  <div class="controls" id="controlsPanel">
    <div class="top-row">
      <div class="group left">
        <img id="volumeBtn" src="../Картинки\SOUND ON.png" class="icon">
        <input type="range" id="volumeRange" min="0" max="1" step="0.01" value="1">
      </div>
      <div class="group center">
        <img id="playBtn" src="../Картинки\PLAY.png" class="play-icon">
      </div>
      <div class="group right">
        <img id="fullscreenBtn" src="../Картинки\Union.png" class="icon">
        <img id="settingsBtn" src="../Картинки\kropka kropka kropka.png" class="icon">
      </div>
    </div>
    <div class="bottom-row">
      <span id="currentTime">00:00</span>
      <input type="range" id="progress" min="0" max="100" step="0.01" value="0">
      <span id="duration">00:00</span>
    </div>
  </div>
</div>

<div id="shareBtn">Падзяліцца</div>
<a id="backBtn" href="#">Назад</a>

<div id="shareModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">Падзяліцца</div>
    <div class="modal-link-box">
      <span id="shareLink">https://www.tiktok.com/@sdumik</span>
    </div>
  </div>
</div>

<script src="BelSDUM.js"></script>
</body>
</html>
