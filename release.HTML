<!DOCTYPE html>
<html lang="be">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">BelSDUM | Загрузка...</title>
    <link rel="stylesheet" href="release.css"> 
    <link rel="icon" type="image/png" href="LogoBelSDUMPNG.png">
</head>
<body>
    
    <img src="icon/Logo.png" alt="Logo" class="main-logo" draggable="false">
    <div class="content-container">
        <div class="top-section">
            <div class="poster-container">
                <img id="rel-poster" src="" alt="Постер" draggable="false">
                <a href="#" id="watch-btn" class="play-btn">Глядзець</a>
            </div>

            <div class="info-card">
                <div class="card-header">
                    <div class="title-group">
                        <h1 id="rel-title">Загрузка...</h1>
                        <h2 id="rel-subtitle" class="sub-title">...</h2>
                    </div>
                    <div class="rating-group">
                        <div id="rel-score" class="rating-value">0,0</div>
                        <div id="rel-duration" class="duration">...</div>
                    </div>
                </div>

                <div id="rel-desc" class="description">
                    </div>
            </div>
        </div>

        <div class="trailer-wrapper" id="trailerWrapper">
            <canvas id="ambientCanvas" class="ambient-light"></canvas>
            <div class="trailer-container" id="trailerBox">
                <video id="previewVideo" autoplay muted loop playsinline>
                    </video>
                <div class="play-overlay">Націсніце, каб уключыць гук</div>
            </div>
        </div>
    
    <div id="shareBtn">
    <img id="shareBtnImg" src="icon/SHARE.png" class="shareImg" >
    </div>
    
    <a id="backBtn" href="index.html">Назад</a>

    <div id="shareModal" class="modal-overlay">
    <div class="modal-content">
    <div class="modal-header">Падзяліцца</div>
    <div class="modal-link-box">
    <span id="shareLink"></span>
    </div>
    </div>
    </div>
        
    <script src="database.js"></script>
    <script src="release.js"></script>

</body>
</html>
