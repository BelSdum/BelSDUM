<!DOCTYPE html>
<html lang="be">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="m-page-title">BelSDUM | Загрузка...</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../LogoBelSDUMPNG.png">
    <link rel="stylesheet" href="Mrelease.css">
</head>
<body>

    <!-- Верхняя секция с фоновым видео и стрелкой назад -->
    <div class="m-rel-hero">
        <!-- Кнопка Назад (Слева) -->
        <a href="Mindex.html" class="m-back-btn" id="mBackBtn" aria-label="Назад">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>

        <!-- Кнопка включения/выключения звука (Справа) -->
        <button type="button" class="m-volume-btn" id="mMuteBtn" aria-label="Звук">
            <!-- Иконка: Звук выключен (по умолчанию) -->
            <img src="../icon/SOUND OFF.png" class="icon-muted" alt="Mute" draggable="false">

            <!-- Иконка: Звук включен -->
            <img src="../icon/SOUND ON.png" class="icon-unmuted" alt="Unmute" draggable="false" style="display: none;">
        </button>
        
        <div class="m-hero-video-wrapper">
            <video id="mHeroVideo" class="m-hero-bg-video" autoplay muted loop playsinline></video>
            <div class="m-hero-overlay"></div>
        </div>
    </div>

    <!-- Основной контент страницы -->
    <main class="m-rel-container">
        
        <!-- Название, длительность, оценка и мета-информация -->
        <div class="m-rel-header">
            <div class="m-title-row">
                <h1 id="m-rel-title">Загрузка...</h1>
                <span id="m-rel-duration" class="m-rel-duration"></span>
            </div>
            <div id="m-rel-score" class="m-rel-score">0,0</div>
            <div id="m-rel-subtitle" class="m-rel-subtitle">...</div>
        </div>

        <!-- Кнопка "Глядзець" и "В избранное" -->
        <div class="m-rel-actions">
            <a href="#" id="m-watch-btn" class="m-btn-primary">Глядзець</a>
            
            <button type="button" id="m-fav-btn" class="m-action-circle" aria-label="Буду глядзець">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
            </button>

            <!-- Новая кнопка "Поделиться" -->
            <button type="button" id="m-share-btn" class="m-action-circle" aria-label="Падзяліцца">
                <img id="shareBtnImg" src="../icon/SHARE.png" class="shareImg">
            </button>
        </div>

        <!-- Блок с описанием фильма -->
        <div class="m-rel-desc-box" id="mDescBox">
            <div id="m-rel-desc" class="m-desc-text"></div>
            <button type="button" id="mDescToggleBtn" class="m-desc-toggle-btn" style="display: none;">разгарнуць</button>
        </div>

        

        <!-- Трэйлер секция -->
        <section class="m-trailer-section">
            <h2 class="m-section-title">Трэйлер</h2>
            <div class="m-trailer-box">
                <video id="mTrailerVideo" controls playsinline></video>
            </div>
        </section>

        <!-- Орнамент и Футер -->
        

        <footer class="m-footer">
            <div class="m-footer-badge">
                Праект ад <span class="m-sdum-accent">SDUM</span>
            </div>
        </footer>
    </main>

    <!-- Модальное окно "Поделиться" -->
    <div id="m-shareModal" class="m-modal-overlay">
        <div class="m-modal-content">
            <h3 class="m-modal-header">Падзяліцца</h3>
            
            <div class="m-share-socials-row">
                <a href="#" id="m-shareTG" class="m-social-btn" target="_blank">
                    <span>Telegram</span>
                </a>
            </div>

            <div class="m-modal-input-wrapper">
                <input type="text" id="m-shareInputLink" readonly>
                <button type="button" id="m-copyLinkBtn" class="m-modal-copy-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </div>
            
            <button id="m-closeShareBtn" class="m-modal-close-btn">Закрыць</button>
        </div>
    </div>

    <script src="../database.js"></script>
    <script src="Mrelease.js"></script>


</body>
</html>
