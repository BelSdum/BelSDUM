<!DOCTYPE html>
<html lang="be">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">BelSDUM | Плэер</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../LogoBelSDUMPNG.png">
    <link rel="stylesheet" href="Mplayer.css">
</head>
<body>

    <!-- Фоновое свечение и звездное небо -->

    <!-- Основной контейнер плеера -->
    <div class="player" id="mainPlayer">
        
        <!-- Музыкальный баннер -->
        <div id="musicBanner" class="music-banner hide">
            <div class="music-banner-content">
                <img id="bannerTrackCover" src="" class="music-cover-mini" alt="Cover">
                <div class="music-info">
                    <span id="bannerTrackTitle" class="music-title">Назва</span>
                    <span class="music-divider">•</span>
                    <span id="bannerTrackArtist" class="music-artist">Выканаўца</span>
                </div>
            </div>
        </div>

        <!-- Видео и аудио потоки -->
        <video id="video" muted playsinline webkit-playsinline></video>
        <audio id="externalAudio" src=""></audio>

        <!-- Космический лоадер (Черная дыра) -->
        <div id="videoLoader" class="cosmos-loader">
            <div class="black-hole"></div>
            <div class="orbit-ring"></div>
        </div>

        <!-- Возрастная плашка 18+ -->
        <img id="overlayImage" src="../icon/warning.png" alt="18+">

        <div class="player-logo">
            <img src="../icon/Logo.png" alt="BelSDUM">
        </div>

        <!-- Кнопка возврата назад -->


        <!-- Панель управления плеером -->
        <div class="controls" id="controlsPanel">

            

            <a id="backBtn" href="Mrelease.html" aria-label="Назад">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            
            <!-- Шапка с названием фильма -->
            <div class="video-header" id="videoHeader"> </div>


            <!-- Кнопка пропуска интро -->
            <div id="skipBtn">Прапусціць</div>

            <!-- Центральные элементы управления (Плей/Пауза с иконками + Перемотка) -->
            <div class="m-center-controls">
                    <button type="button" id="rewindBtn" class="m-skip-time-btn" aria-label="Назад на 10с">
                        <img src="../icon/SKIP10LEFT.png" class="skip-icon" alt="-10s">
                    </button>

                <button type="button" id="playBtnContainer" class="m-play-trigger" aria-label="Пйграць / Паўза">
                    <img id="playBtn" src="../icon/PLAY.png" class="play-icon" alt="Play">
                </button>

                <button type="button" id="forwardBtn" class="m-skip-time-btn" aria-label="Наперад на 10с">
                    <img src="../icon/SKIP10RIGHT.png" class="skip-icon" alt="+10s">
                </button>
            </div>

            <!-- Нижняя панель управления -->
            <div class="bottom-bar">
                
                <h1 class="main-title">Загрузка...</h1>
                <h2 class="sub-title">...</h2>
                
                <div class="bottom-row">
                    <span id="currentTime">00:00</span>
                    <input type="range" id="progress" min="0" max="100" step="0.01" value="0">
                    <span id="duration">00:00</span>
                </div>
                
                <div class="actions-row">
                    <div class="left-actions"></div>
                    <div class="right-actions">
                        <button type="button" id="fullscreenBtn" class="icon-btn" aria-label="Полноэкранный режим">
                            <img src="../icon/Union.png" alt="Fullscreen" id="fsIcon">
                        </button>
                        <button type="button" id="pipBtn" class="icon-btn" aria-label="Карцінка ў карцінцы">
                            <img src="../icon/Pip.png" alt="PiP">
                        </button>

                        <button type="button" id="settingsBtn" class="icon-btn" aria-label="Якасць">
                            <img src="../icon/kropka kropka kropka.png" alt="Quality">
                        </button>
                    </div>
                </div>
            </div>

            <!-- Выпадающее меню качества -->
            <div class="quality-menu hide" id="qualityMenu">
                <div class="quality-header">Якасць</div>
                <div class="quality-item active" data-quality="1080p">1080p <span class="badge">FHD</span></div>
                <div class="quality-item" data-quality="720p">720p <span class="badge">HD</span></div>
                <div class="quality-item" data-quality="360p">360p</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно "Поделиться" -->
    <div id="shareModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-header">Падзяліцца</h3>
            <div class="share-socials-row">
                <a href="#" id="shareTG" class="social-btn tg-btn" target="_blank"><span>Telegram</span></a>
            </div>
            <div class="modal-input-wrapper">
                <input type="text" id="shareInputLink" readonly>
                <button type="button" id="copyLinkBtn" class="modal-copy-btn">
                    <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span id="copyBtnText">Капіяваць</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Модальное окно музыки -->
    <div id="musicModal" class="modal-overlay">
        <div class="modal-content music-modal-content">
            <div class="music-modal-body">
                <img id="modalTrackCover" src="" class="music-modal-cover" alt="Cover">
                <div class="music-modal-info">
                    <h2 id="modalTrackTitle" class="modal-title-text">Назва трэка</h2>
                    <h3 id="modalTrackArtist" class="modal-artist-text">Выканаўца</h3>
                    <a id="modalTrackLink" href="#" target="_blank" class="listen-btn">на Яндэкс Музыцы</a>
                </div>
            </div>
        </div>
    </div>


<!-- Стартовый экран для мабільных (уваход у фулскрын) -->
    <div id="startOverlay" class="start-overlay">
        <div class="start-card">
            <div class="start-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
            </div>
            <h2>Гатовы да прагляду?</h2>
            <p>Націсніце кнопку ніжэй, каб адкрыць плэер на ўвесь экран.</p>
            <button type="button" id="startPlayBtn" class="start-btn">Адкрыць на ўвесь экран</button>
        </div>
    </div>

    <script src="../database.js"></script>
    <script src="Mplayer.js"></script>
</body>
</html>
