<!DOCTYPE html>
<html lang="be">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BelSDUM | Мобильная версия</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../LogoBelSDUMPNG.png">
    <link rel="stylesheet" href="MГлавная.css">
</head>
<body>

    <!-- Верхняя панель -->
    <header class="m-header">
        <img src="../LogoBelSDUMPNG.png" alt="Logo" class="m-logo" draggable="false">
    </header>

<main class="m-container">
        <!-- Трэйлер -->
        <section class="m-hero">
            <div class="m-hero-video-wrapper">
                <video class="m-hero-video" autoplay muted loop playsinline poster="../poster/poster_fight_club.jpg">
                    <source src="https://pub-e265e68b5cd54b969a844c74b92b4fd3.r2.dev/%D0%B1%D0%BE%D0%B9%D1%86%D0%BE%D0%B2%D1%81%D0%BA%D0%B8%D0%B9%20%D0%BA%D0%BB%D1%83%D0%B1%20%D1%82%D1%80%D0%B5%D0%B9%D0%BB%D0%B5%D1%80.mkv" type="video/mp4">
                </video>
                <div class="m-hero-overlay"></div>
            </div>
            <div class="m-hero-content">
                <img src="../poster/FCHOME.png" class="m-movie-logo">
                <p class="m-movie-meta">Фільм • Драма <span class="m-age-badge">18+</span></p>
                <a href="../release.html?id=fight_club" class="m-btn-primary">Глядзець зараз</a>
            </div>
        </section>

        <!-- Працягнуць прагляд (АРЫГІНАЛ) -->
        <section class="m-section">
            <h2 class="m-section-title">Працягнуць прагляд</h2>
            <div id="continue-watching-container" class="m-horizontal-row"></div>
        </section>
        <!-- Буду глядзець -->
        <section id="favorites-section" class="m-section" style="display: none;">
            <h2 class="m-section-title">Буду глядзець</h2>
            <div id="homeFavoritesRow" class="m-horizontal-row"></div>
        </section>

        <!-- Калекцыя -->
        <section class="m-section">
            <h2 class="m-section-title">Калекцыя</h2>
            <div id="movieGrid" class="m-horizontal-row"></div>
        </section>

        <!-- Поддержка Boosty -->
        <section class="m-support-section">
            <div class="m-support-card">
                <div class="m-support-info">
                    <h3 class="m-support-title">Падтрымаць праект</h3>
                    <p class="m-support-text">Ваша падтрымка дапамагае нам заставацца на арбіце: паляпшаць платформу і дадаваць новыя фільмы на роднай мове.</p>
                </div>
                <a href="https://boosty.to/belsdum_by/donate" target="_blank" class="m-boosty-btn">
                    <svg class="m-boosty-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                    Падтрымаць на Boosty
                </a>
            </div>
        </section>

        <!-- Орнамент -->
        <div class="m-ornament-divider"></div>

        <!-- Футер -->
        <footer class="m-footer">
            <div class="m-footer-badge">
                Праект ад <span class="m-sdum-accent">SDUM</span>
            </div>
        </footer>
    </main>

    <script type="module" src="MГлавная.js"></script>
</body>
</html>
